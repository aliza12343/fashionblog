server.port=8081

# Database — set DB_URL / DB_USERNAME / DB_PASSWORD env vars in production (SSM Parameter Store)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fashion_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:2025?Columbus}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT — set JWT_SECRET env var in production (SSM Parameter Store)
jwt.secret=${JWT_SECRET:fashionblog-secret-key-must-be-at-least-256-bits!!}

# CORS — comma-separated list of allowed origins
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
